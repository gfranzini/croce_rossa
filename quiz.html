<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Soccorso</title>

<style>

body{
font-family:system-ui;
background:linear-gradient(135deg,#e8f0ff,#f7f9ff);
margin:0;
padding:16px;
display:flex;
justify-content:center;
}

.container{
max-width:900px;
width:100%;
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
transition:background 0.3s;
}

button{
padding:14px 18px;
border:none;
border-radius:10px;
background:#3a7afe;
color:white;
cursor:pointer;
margin:6px 4px;
font-size:16px;
font-weight:600;
}

.secondary{
background:#b41818;
}

.skip{
background:#f39c12;
}

.filterBtn{
background:#6c7a89;
}

.option{
padding:14px;
border:1px solid #ddd;
border-radius:10px;
margin:8px 0;
cursor:pointer;
font-size:16px;
}

.option:hover{
background:#eef3ff;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.flashcard{
font-size:22px;
padding:40px;
text-align:center;
cursor:pointer;
}

.hidden{
display:none;
}

.progressContainer{
width:100%;
height:14px;
background:#e5e5e5;
border-radius:8px;
overflow:hidden;
margin-top:10px;
}

#progressBar{
height:100%;
width:0%;
background:#27ae60;
transition:width 0.3s;
}

.correctFlash{
animation:correctAnim 0.6s;
}

.wrongFlash{
animation:wrongAnim 0.6s;
}

@keyframes correctAnim{
0%{background:#ffffff;}
40%{background:#b8f5c2;}
100%{background:#ffffff;}
}

@keyframes wrongAnim{
0%{background:#ffffff;}
40%{background:#ffb0b0;}
100%{background:#ffffff;}
}

@media (max-width:600px){

button{
width:100%;
margin:6px 0;
}

.flashcard{
font-size:20px;
padding:30px 10px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>🚑 Quiz Soccorso</h2>

<button onclick="setMode('quiz')">Quiz</button>
<button onclick="setMode('flash')">Flashcards</button>
<button onclick="setMode('case')">Casi clinici</button>

<div>

<button class="filterBtn" onclick="setFilter('all')">Tutti</button>
<button class="filterBtn" onclick="setFilter('acro')">Solo acronimi</button>
<button class="filterBtn" onclick="setFilter('num')">Solo valori</button>
<button class="filterBtn" onclick="setFilter('errors')">Solo errori</button>

</div>

<hr>

<div id="question"></div>

<div id="answers"></div>

<input id="textAnswer" class="hidden">

<div id="rangeInputs" class="hidden">

<input id="rangeMin" type="number" inputmode="numeric" placeholder="min">
<input id="rangeMax" type="number" inputmode="numeric" placeholder="max">

</div>

<button class="secondary" onclick="showAnswer()">Mostra risposta</button>
<button class="skip" onclick="skipQuestion()">Salta</button>
<button onclick="nextQuestion()">Prossima</button>

<div id="feedback"></div>

<div class="progressContainer">
<div id="progressBar"></div>
</div>

<div id="stats"></div>

</div>

</div>

<script src="data.js"></script>

<script>

let mode="quiz"
let filter="all"

let score=0
let total=0

let current
let answered=false
let skipped=[]
let memory={}

function animateResult(ok){

let card=document.querySelector(".card")

if(ok){
card.classList.add("correctFlash")
setTimeout(()=>card.classList.remove("correctFlash"),600)
}else{
card.classList.add("wrongFlash")
setTimeout(()=>card.classList.remove("wrongFlash"),600)
}

}

function levenshtein(a,b){

const matrix=[]

for(let i=0;i<=b.length;i++){matrix[i]=[i]}
for(let j=0;j<=a.length;j++){matrix[0][j]=j}

for(let i=1;i<=b.length;i++){
for(let j=1;j<=a.length;j++){

if(b.charAt(i-1)==a.charAt(j-1)){
matrix[i][j]=matrix[i-1][j-1]
}else{
matrix[i][j]=Math.min(
matrix[i-1][j-1]+1,
matrix[i][j-1]+1,
matrix[i-1][j]+1
)
}

}
}

return matrix[b.length][a.length]

}

function setMode(m){
mode=m
nextQuestion()
}

function setFilter(f){
filter=f
nextQuestion()
}

function randomItem(){

if(skipped.length>0 && Math.random()<0.3){
return skipped.shift()
}

let pool=data

if(filter==="acro") pool=data.filter(d=>d.type==="acro")
if(filter==="num") pool=data.filter(d=>d.type==="num")
if(filter==="errors") pool=data.filter(d=>memory[d.term]===1)

if(pool.length===0) pool=data

return pool[Math.floor(Math.random()*pool.length)]

}

function nextQuestion(){

answered=false

document.getElementById("answers").innerHTML=""
document.getElementById("feedback").innerHTML=""
document.getElementById("textAnswer").value=""
document.getElementById("rangeMin").value=""
document.getElementById("rangeMax").value=""

document.getElementById("textAnswer").classList.add("hidden")
document.getElementById("rangeInputs").classList.add("hidden")

current=randomItem()

if(mode==="flash"){

document.getElementById("question").innerHTML=
`<div class="flashcard" onclick="flip()">${current.term}</div>`

return
}

if(mode==="case"){
generateCase()
return
}

if(current.type==="acro"){

document.getElementById("question").innerHTML=
"Significato di <b>"+current.term+"</b>"

document.getElementById("textAnswer").classList.remove("hidden")

return
}

if(current.type==="num"){

let reverse=Math.random()<0.4

if(reverse){

let valueText=getValueText(current)

document.getElementById("question").innerHTML=
"A quale parametro corrisponde il valore <b>"+valueText+"</b>?"

let answers=[current.term]

let options=data.filter(d=>d.type==="num").map(d=>d.term)

while(answers.length<4){

let r=options[Math.floor(Math.random()*options.length)]
if(!answers.includes(r))answers.push(r)

}

answers.sort(()=>Math.random()-0.5)

answers.forEach(a=>{
let el=document.createElement("div")
el.className="option"
el.innerText=a
el.onclick=()=>checkReverse(a)
document.getElementById("answers").appendChild(el)
})

return
}

document.getElementById("question").innerHTML=
"Valore: <b>"+current.term+"</b>"

if(current.rule==="range"){
document.getElementById("rangeInputs").classList.remove("hidden")
}else{
document.getElementById("textAnswer").classList.remove("hidden")
}

return
}

document.getElementById("question").innerHTML=
"Cosa significa <b>"+current.term+"</b>?"

let answers=[current.def]

let defs=data.filter(d=>d.def).map(d=>d.def)

while(answers.length<4){
let r=defs[Math.floor(Math.random()*defs.length)]
if(!answers.includes(r))answers.push(r)
}

answers.sort(()=>Math.random()-0.5)

answers.forEach(a=>{
let el=document.createElement("div")
el.className="option"
el.innerText=a
el.onclick=()=>checkMulti(a)
document.getElementById("answers").appendChild(el)
})

}

</script>

</body>
</html>
